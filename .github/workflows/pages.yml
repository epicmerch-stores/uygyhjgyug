name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
        env:
          NEXT_PUBLIC_EPICMERCH_API_KEY: "pk_live_f5722a3df0142d1dbb3f6a660431627e"
          NEXT_PUBLIC_EPICMERCH_BASE_URL: https://server.epicmerch.in/api
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v4
        with:
          enablement: true
      - uses: actions/deploy-pages@v4
        id: deployment
